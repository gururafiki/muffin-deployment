[server]
host = "0.0.0.0"
port = 8080
log_level = "INFO"

[runtime]
type = "docker"
# execd_image = "opensandbox/execd:v1.0.6"
execd_image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/execd:v1.0.6"

[egress]
image = "opensandbox/egress:v1.0.1"
# image = "sandbox-registry.cn-zhangjiakou.cr.aliyuncs.com/opensandbox/egress:v1.0.1"

[docker]
# Sandboxes join the attachable Swarm overlay 'muffin-net' so the opensandbox-server (and the
# langgraph-api client) — both on that overlay — reach them directly by overlay IP. Bridge-mode
# sandboxes are NOT reachable from overlay containers: the published-port DNAT doesn't apply for
# overlay->host-bridge-IP traffic (connection refused) and the host LAN IP isn't routable from the
# overlay. ingress 'direct' (below) then connects to the sandbox's own IP.
network_mode = "muffin-net"
# host_ip only applies to bridge mode (server reaching host-published sandbox ports); unused here.
host_ip = "172.18.0.1"
drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
no_new_privileges = true
pids_limit = 512

[ingress]
mode = "direct"
