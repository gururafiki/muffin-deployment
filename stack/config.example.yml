---
# Muffin stack ŌĆö NON-SECRET deployment config.
#
# Copy to `config.yml` (gitignored) and adjust. Loaded by `muffin_stack.yml` (include_vars)
# alongside secrets.yaml, then rendered into the stack's environment. Nothing secret goes here ŌĆö
# API keys / passwords / tokens live in secrets.yaml.

# === Public DNS / TLS ===
domain: "example.com"           # served at https://<app_subdomain>.<domain>, https://<chat_subdomain>.<domain> and https://<api_subdomain>.<domain>
app_subdomain: "muffin"         # new Expo/React Native web client
chat_subdomain: "muffin-chat"   # legacy agent-chat-ui (kept alongside the new app)
api_subdomain: "api"
supabase_subdomain: "supabase"        # Supabase API gateway (Kong; public ŌĆö anon key + RLS)
studio_subdomain: "supabase-studio"   # Supabase Studio (admin; behind Cloudflare Access)
acme_email: "you@example.com"   # Let's Encrypt account email (cert-expiry notices)

# === Supabase / LangGraph DB cutover ===
# false: langgraph-api keeps using langgraph-postgres (pre-M8 layout).
# true:  langgraph-api uses supabase-db's `postgres` database (tables in `public`), so its data
#        is browsable in Supabase Studio (which shows that one database).
# Flip to true ONLY after migrating the data ŌĆö see README "Supabase cutover" runbook.
use_supabase_db: false

# === Container images (GHCR; pulled by the node) ===
image_agent: "ghcr.io/gururafiki/muffin-agent:latest"
image_openbb: "ghcr.io/gururafiki/openbb-mcp-docker:latest"
image_ui: "ghcr.io/gururafiki/agent-chat-ui-docker:latest"
image_app: "ghcr.io/gururafiki/muffin-ui:latest"
image_nuq_postgres: "ghcr.io/gururafiki/nuq-postgres-docker:latest"

# === Container registry login (so the node can pull the private GHCR packages) ===
registry_server: "ghcr.io"
registry_username: "<github-user>"

# === Muffin LLM config (non-secret; API keys are in secrets.yaml) ===
# RECOMMENDED: an ordered CROSS-PROVIDER model chain (primary first, rest are
# fallbacks). When set, `llm_chain` is authoritative for every role ŌĆö it
# supersedes `llm_provider`/`orchestrator_models`/ŌĆ” below. Profiles OMIT the
# api_key (it resolves the matching *_api_key from secrets.yaml). Each profile
# carries its own `requests_per_second`, and models sharing a rate share ONE
# process-wide InMemoryRateLimiter ŌĆö this is what throttles the council's ~19-way
# parallel fan-out. Ollama Cloud rejects bursts with "too many concurrent
# requests" (429), so the primary MUST be throttled too (effective concurrency Ōēł
# rps ├Ś avg_call_latency; 0.5/s keeps a multi-second-per-call fan-out to a handful
# in flight ŌĆö tune up if too slow, down if 429s reappear). The OpenRouter free
# fallback stays at 0.3 (=18/min, under the 20/min free cap; free routes also have
# a daily cap). The `ollama` provider uses the native /api/chat API (Ollama Cloud
# https://ollama.com by default ŌĆö NEVER append /v1, its tool calling is unreliable).
llm_chain:
  - provider: ollama
    model: "minimax-m3:cloud"
    requests_per_second: 0.5
  - provider: openrouter
    model: "nvidia/nemotron-3-super-120b-a12b:free"
    requests_per_second: 0.3
# Optional Ollama host override (default https://ollama.com). Local: http://localhost:11434
# ollama_base_url: "https://ollama.com"

# --- Legacy single-provider path (IGNORED while llm_chain is set above) ---
llm_provider: "openrouter"                 # openai | anthropic | openrouter | ollama
openai_site_url: "https://openrouter.ai/api/v1"
orchestrator_models: "anthropic/claude-sonnet-4-6"
collector_models: "anthropic/claude-haiku-4-5"
reasoner_models: "anthropic/claude-sonnet-4-6"
# The summariser uses the single-model path ŌåÆ the derived primary provider, so
# with the Ollama chain above set it must be an Ollama tag (not OpenRouter).
summariser_model: "minimax-m3:cloud"
llm_sdk_retries: 6
temperature: 0.1
# Legacy global cap for the single-model path only (the chain uses per-profile
# requests_per_second above). Blank/remove for no limit.
llm_requests_per_second: 0.3

# === Observability (non-secret bits; keys are in secrets.yaml) ===
langsmith_tracing: "true"
langsmith_endpoint: "https://api.smith.langchain.com"
langsmith_project: "muffin-prod"
langfuse_base_url: "https://cloud.langfuse.com"

# === Misc ===
firecrawl_api_key: "local"      # any non-empty string for self-hosted Firecrawl (no auth)
# Debug fallback user id so agent-chat-ui (no configurable.user_id) can use persistent memory.
# Set to "" once LangGraph custom auth (auth.py) is wired for real per-user isolation.
memory_debug_user_id: "shared"

# === Database backups (nightly pg_dumpall of supabase-db -> OCI Object Storage) ===
# Bucket is created by terraform (backups.tf); the script prunes backups >30 days.
# The host cron uploads via the S3-compatible endpoint using the tfstate Customer
# Secret Keys (AWS_ACCESS_KEY_ID/SECRET must be in the deploy env; absent locally
# = skipped). See README "Database backups" for the restore runbook.
db_backups_enabled: true
db_backups_bucket: "muffin-db-backups"
db_backups_s3_endpoint: "https://<namespace>.compat.objectstorage.<region>.oraclecloud.com"
