---
# Muffin stack — SECRETS only (API keys, passwords, tokens).
#
# Copy to `secrets.yaml` (gitignored via *secrets.yaml) and fill in. Loaded by `muffin_stack.yml`
# alongside config.yml. Non-secret deployment config (domain, registry, models, …) goes in
# config.yml — NOT here.

# === LLM / observability API keys (from your muffin-agent/.env) ===
openrouter_api_key: "<openrouter-or-openai-key>"
# openai_api_key:   "<only if different from openrouter_api_key>"
ollama_api_key: "<ollama-cloud-key>"        # required if llm_chain uses the "ollama" provider (ollama.com/settings/keys)
langsmith_api_key: "<lsv2_pt_...>"          # required — the LangGraph standalone server is licensed via LangSmith
langfuse_secret_key: "<sk-lf-...>"          # optional (tracing)
langfuse_public_key: "<pk-lf-...>"          # optional (tracing)

# === OpenBB provider keys (from your extras/openbb/.env) ===
fmp_api_key: "<financialmodelingprep-key>"  # add more providers in docker-compose.yaml as needed

# === Datastore secrets (generate: openssl rand -hex 16/32) ===
postgres_password: "<openssl rand -hex 16>"
firecrawl_postgres_password: "<openssl rand -hex 16>"
searxng_secret_key: "<openssl rand -hex 32>"

# === Supabase (generate all six with: stack/supabase/generate-keys.sh) ===
# jwt_secret signs every Supabase JWT; anon/service_role keys are long-lived JWTs
# DERIVED from it (regenerate them together, never independently).
supabase_db_password: "<from generate-keys.sh>"
supabase_jwt_secret: "<from generate-keys.sh>"
supabase_anon_key: "<from generate-keys.sh>"            # public client key (safe to ship in the app)
supabase_service_role_key: "<from generate-keys.sh>"    # ADMIN key — server-side only, never in clients
supabase_pg_meta_crypto_key: "<from generate-keys.sh>"  # postgres-meta/Studio connection-string encryption
supabase_secret_key_base: "<from generate-keys.sh>"     # Realtime (Phoenix) session key
supabase_realtime_db_enc_key: "<from generate-keys.sh>" # Realtime column encryption (exactly 16 chars)

# === Supabase SMTP (OPTIONAL — leave empty to auto-confirm signups without e-mail) ===
# Cloudflare Email Service: host smtp.mx.cloudflare.net, port 465, user "api_token",
# pass = a CF API token with Email Sending permission (domain onboarded first).
# Works with any SMTP provider (Resend, Brevo, …). See README "Auth e-mails".
supabase_smtp_host: ""
supabase_smtp_port: "465"
supabase_smtp_user: ""
supabase_smtp_pass: ""
supabase_smtp_admin_email: ""    # From: address (defaults to no-reply@<domain>)
supabase_smtp_sender_name: "Muffin"

# === Supabase OAuth providers (OPTIONAL — leave empty to disable) ===
# Register an OAuth app on each provider with the callback
#   https://<supabase_subdomain>.<domain>/auth/v1/callback
# then paste its client id + secret here. See README "OAuth providers".
supabase_github_client_id: ""
supabase_github_secret: ""
supabase_google_client_id: ""
supabase_google_secret: ""

# === Cloudflare (Traefik DNS-01) ===
# Reuse the SAME token you put in terraform.tfvars (cloudflare_api_token) — it has Zone:DNS:Edit.
cf_dns_api_token: "<cloudflare-api-token>"

# === Container registry ===
# Leave empty if the GHCR packages are PUBLIC (the node pulls anonymously). Set a GitHub PAT
# (read:packages) only if you keep the packages private.
registry_password: ""
