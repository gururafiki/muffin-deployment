---
# Muffin stack — SECRETS only (API keys, passwords, tokens).
#
# Copy to `secrets.yaml` (gitignored via *secrets.yaml) and fill in. Loaded by `muffin_stack.yml`
# alongside config.yml. Non-secret deployment config (domain, registry, models, …) goes in
# config.yml — NOT here.

# === LLM / observability API keys (from your muffin-agent/.env) ===
openrouter_api_key: "<openrouter-or-openai-key>"
# openai_api_key:   "<only if different from openrouter_api_key>"
langsmith_api_key: "<lsv2_pt_...>"          # required — the LangGraph standalone server is licensed via LangSmith
langfuse_secret_key: "<sk-lf-...>"          # optional (tracing)
langfuse_public_key: "<pk-lf-...>"          # optional (tracing)

# === OpenBB provider keys (from your extras/openbb/.env) ===
fmp_api_key: "<financialmodelingprep-key>"  # add more providers in docker-compose.yaml as needed

# === Datastore secrets (generate: openssl rand -hex 16/32) ===
postgres_password: "<openssl rand -hex 16>"
firecrawl_postgres_password: "<openssl rand -hex 16>"
searxng_secret_key: "<openssl rand -hex 32>"

# === Cloudflare (Traefik DNS-01) ===
# Reuse the SAME token you put in terraform.tfvars (cloudflare_api_token) — it has Zone:DNS:Edit.
cf_dns_api_token: "<cloudflare-api-token>"

# === Container registry ===
# Leave empty if the GHCR packages are PUBLIC (the node pulls anonymously). Set a GitHub PAT
# (read:packages) only if you keep the packages private.
registry_password: ""
