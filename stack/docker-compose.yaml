# Muffin Agent — Docker Swarm stack (ARM64 / OCI Always-Free single node).
#
# This file is rendered by Ansible (`muffin_stack.yml`) via the `template:` module:
#   {{ '{{' }} ... {{ '}}' }} placeholders are filled from secrets.yaml before
#   `docker stack deploy`. Do not run `docker stack deploy` on this file directly.
#
# Exposure: ONLY `traefik` publishes host ports (80/443). With
# providers.swarm.exposedByDefault=false (see traefik.yml), a service is routable
# only if it carries `traefik.enable=true` labels under `deploy.labels` — which
# only `agent-chat-ui` and `langgraph-api` do. Every MCP / infra service stays
# internal on the `muffin-net` overlay and is unreachable from the internet.
version: "3.8"

# ---------------------------------------------------------------------------
# traefik.yml and config.toml are bind-mounted from /home/ubuntu (staged by
# Ansible) rather than declared as Swarm `configs:` — Swarm configs are immutable
# and break redeploys when the file changes. Bind mounts stay editable (single node).

secrets:
  postgres_password:
    external: true               # docker secret create postgres_password
  firecrawl_postgres_password:
    external: true
  cf_dns_api_token:
    external: true               # Cloudflare Zone:DNS:Edit token for Traefik DNS-01

volumes:
  langgraph-data:
  firecrawl-postgres-data:
  traefik-acme:
  supabase-db-data:
  supabase-db-config:
  supabase-storage-data:

networks:
  muffin-net:
    name: muffin-net             # fixed name (no stack prefix) so Traefik's provider.network matches
    driver: overlay
    attachable: true

# ===========================================================================
services:

  # --- Ingress: the only service exposed to the internet ------------------
  traefik:
    # v3.6.1+ negotiates the Docker API version; older Traefik pins 1.24 which Docker 29
    # (min API 1.40+) rejects, so the swarm provider finds no routers and issues no certs.
    image: traefik:v3.6.1
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - published: 80
        target: 80
        protocol: tcp
        mode: host
      - published: 443
        target: 443
        protocol: tcp
        mode: host
    environment:
      # lego reads the Cloudflare token from this file for the DNS-01 challenge
      CF_DNS_API_TOKEN_FILE: /run/secrets/cf_dns_api_token
    secrets:
      - cf_dns_api_token
    volumes:
      - /home/ubuntu/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/letsencrypt
    networks:
      - muffin-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

  # --- LangGraph agent server (EXPOSED via Traefik: api.<domain>) ---------
  langgraph-api:
    image: {{ image_agent }}
    environment:
      # --- wiring (internal service URLs) ---
      REDIS_URI: redis://langgraph-redis:6379
      # LangGraph checkpointer/store DB. Flip use_supabase_db in config.yml to cut over to
      # the dedicated `langgraph` database inside the Supabase Postgres (see README runbook);
      # langgraph-postgres stays deployed until the cutover is verified.
      DATABASE_URI: "{{ 'postgres://postgres:' ~ supabase_db_password ~ '@supabase-db:5432/langgraph?sslmode=disable' if use_supabase_db | default(false) else 'postgres://postgres:' ~ postgres_password ~ '@langgraph-postgres:5432/postgres?sslmode=disable' }}"
      # Supabase JWT verification (auth.py mode 4): user Bearer tokens minted by GoTrue.
      SUPABASE_URL: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}"
      SUPABASE_JWT_SECRET: "{{ supabase_jwt_secret | default('') }}"
      # Sign-in is optional: no credential -> anonymous (Cloudflare Access remains
      # the perimeter); a presented-but-invalid credential still 401s.
      MUFFIN_AUTH_OPTIONAL: "{{ muffin_auth_optional | default('true') }}"
      OPENBB_MCP_URL: http://openbb-mcp:8001/mcp
      OPENSANDBOX_URL: opensandbox-server:8080
      FIRECRAWL_MCP_URL: http://firecrawl-mcp:3000/mcp
      SEARXNG_URL: http://searxng:8080
      # --- secrets (from secrets.yaml) ---
      OPENAI_API_KEY: "{{ openai_api_key | default(openrouter_api_key) }}"
      OPENROUTER_API_KEY: "{{ openrouter_api_key }}"
      LANGSMITH_API_KEY: "{{ langsmith_api_key }}"
      LANGFUSE_SECRET_KEY: "{{ langfuse_secret_key | default('') }}"
      LANGFUSE_PUBLIC_KEY: "{{ langfuse_public_key | default('') }}"
      # --- non-secret config (from config.yml) ---
      LLM_PROVIDER: "{{ llm_provider | default('openrouter') }}"
      OPENAI_SITE_URL: "{{ openai_site_url | default('https://openrouter.ai/api/v1') }}"
      ORCHESTRATOR_MODELS: "{{ orchestrator_models | default('') }}"
      COLLECTOR_MODELS: "{{ collector_models | default('') }}"
      REASONER_MODELS: "{{ reasoner_models | default('') }}"
      SUMMARISER_MODEL: "{{ summariser_model | default('') }}"
      LLM_SDK_RETRIES: "{{ llm_sdk_retries | default(6) }}"
      TEMPERATURE: "{{ temperature | default(0.1) }}"
      # Global cap on LLM req/s shared by all chat models — keeps the 13-persona council
      # under OpenRouter's free 20/min cap. Blank = no limit. See config.yml.
      LLM_REQUESTS_PER_SECOND: "{{ llm_requests_per_second | default('') }}"
      LANGSMITH_TRACING: "{{ langsmith_tracing | default('false') }}"
      LANGSMITH_ENDPOINT: "{{ langsmith_endpoint | default('https://api.smith.langchain.com') }}"
      LANGSMITH_PROJECT: "{{ langsmith_project | default('muffin') }}"
      LANGFUSE_BASE_URL: "{{ langfuse_base_url | default('https://cloud.langfuse.com') }}"
      # Debug fallback so agent-chat-ui (which doesn't set configurable.user_id)
      # can use persistent memory. Once LangGraph custom auth (auth.py) is wired,
      # REMOVE this for real per-user memory isolation.
      MEMORY_DEBUG_USER_ID: "{{ memory_debug_user_id | default('shared') }}"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ok')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 3G
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=muffin-net"
        - "traefik.http.routers.api.rule=Host(`{{ api_subdomain | default('api') }}.{{ domain }}`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=cloudflare"
        - "traefik.http.services.api.loadbalancer.server.port=8000"
        # CORS so the browser UIs (different subdomains) can call the API.
        # Web traffic is normally same-origin (each UI proxies /api), but native
        # app builds call the API directly, so allow both UI origins.
        - "traefik.http.routers.api.middlewares=api-cors"
        - "traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=https://{{ chat_subdomain | default('muffin-chat') }}.{{ domain }},https://{{ app_subdomain | default('muffin') }}.{{ domain }}"
        - "traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS"
        - "traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=*"
        - "traefik.http.middlewares.api-cors.headers.accessControlAllowCredentials=true"
        - "traefik.http.middlewares.api-cors.headers.accessControlMaxAge=86400"

  # --- Chat UI (EXPOSED via Traefik: chat.<domain>) -----------------------
  agent-chat-ui:
    image: {{ image_ui }}
    environment:
      # Server-side API proxy target (runtime). The UI is built with NEXT_PUBLIC_API_URL=/api, so
      # the browser calls same-origin /api and the Next server proxies here over the overlay.
      LANGGRAPH_API_URL: http://langgraph-api:8000
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=muffin-net"
        - "traefik.http.routers.chat.rule=Host(`{{ chat_subdomain | default('muffin-chat') }}.{{ domain }}`)"
        - "traefik.http.routers.chat.entrypoints=websecure"
        - "traefik.http.routers.chat.tls.certresolver=cloudflare"
        - "traefik.http.services.chat.loadbalancer.server.port=3000"

  # --- Muffin app (EXPOSED via Traefik: muffin.<domain>) ------------------
  # New Expo/React Native web client. Static SPA served by nginx, which also
  # reverse-proxies /api → langgraph-api (same-origin, like the chat UI).
  muffin-ui:
    image: {{ image_app }}
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=muffin-net"
        - "traefik.http.routers.app.rule=Host(`{{ app_subdomain | default('muffin') }}.{{ domain }}`)"
        - "traefik.http.routers.app.entrypoints=websecure"
        - "traefik.http.routers.app.tls.certresolver=cloudflare"
        - "traefik.http.services.app.loadbalancer.server.port=80"

  # --- LangGraph state + streaming (internal) -----------------------------
  langgraph-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - langgraph-data:/var/lib/postgresql/data
    networks:
      - muffin-net
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1G

  langgraph-redis:
    image: redis:6
    networks:
      - muffin-net
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 2s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

  # --- Supabase (slim self-host: auth + REST + admin) ----------------------
  # User accounts (GoTrue), RLS'd app tables via PostgREST, and the LangGraph
  # checkpointer DB (dedicated `langgraph` database — see use_supabase_db).
  # Deliberately NOT deployed: realtime, storage, edge-functions, analytics
  # (heavy, unused in M8). Kong is the public API gateway (supabase.<domain>);
  # Studio is admin-only behind Cloudflare Access (supabase-studio.<domain>).
  supabase-db:
    image: supabase/postgres:17.6.1.136
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "5432"
      POSTGRES_PORT: "5432"
      PGPASSWORD: "{{ supabase_db_password }}"
      POSTGRES_PASSWORD: "{{ supabase_db_password }}"
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: "{{ supabase_jwt_secret }}"
      JWT_EXP: "3600"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    volumes:
      # Init scripts run on FIRST boot only (empty volume); staged by Ansible from
      # stack/supabase/db/ (upstream supabase/docker/volumes/db, verbatim).
      - /home/ubuntu/supabase/db/realtime.sql:/docker-entrypoint-initdb.d/migrations/99-realtime.sql
      - /home/ubuntu/supabase/db/webhooks.sql:/docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql
      - /home/ubuntu/supabase/db/roles.sql:/docker-entrypoint-initdb.d/init-scripts/99-roles.sql
      - /home/ubuntu/supabase/db/jwt.sql:/docker-entrypoint-initdb.d/init-scripts/99-jwt.sql
      - supabase-db-data:/var/lib/postgresql/data
      - supabase-db-config:/etc/postgresql-custom
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 1536M

  supabase-auth:
    image: supabase/gotrue:v2.189.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:{{ supabase_db_password }}@supabase-db:5432/postgres
      GOTRUE_SITE_URL: "https://{{ app_subdomain | default('muffin') }}.{{ domain }}"
      GOTRUE_URI_ALLOW_LIST: "https://{{ app_subdomain | default('muffin') }}.{{ domain }}/*"
      # Trusted hosts for confirmation/recovery links (behind Traefik/Cloudflare the
      # request arrives with X-Forwarded-Host; without this GoTrue logs a warning and
      # falls back to API_EXTERNAL_URL).
      GOTRUE_MAILER_EXTERNAL_HOSTS: "{{ supabase_subdomain | default('supabase') }}.{{ domain }},{{ app_subdomain | default('muffin') }}.{{ domain }}"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: "{{ supabase_jwt_secret }}"
      GOTRUE_JWT_ISSUER: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}/auth/v1"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      # SMTP is optional (secrets.yaml). Unset -> signups auto-confirm and password
      # recovery is unavailable. Set -> real confirmation/recovery e-mails.
      # Works with Cloudflare Email Service SMTP (smtp.mx.cloudflare.net:465,
      # user "api_token", password = CF API token) or any provider — see README.
      GOTRUE_MAILER_AUTOCONFIRM: "{{ 'false' if supabase_smtp_host | default('') else 'true' }}"
      GOTRUE_SMTP_HOST: "{{ supabase_smtp_host | default('') }}"
      GOTRUE_SMTP_PORT: "{{ supabase_smtp_port | default('465') }}"
      GOTRUE_SMTP_USER: "{{ supabase_smtp_user | default('') }}"
      GOTRUE_SMTP_PASS: "{{ supabase_smtp_pass | default('') }}"
      GOTRUE_SMTP_ADMIN_EMAIL: "{{ supabase_smtp_admin_email | default('no-reply@' ~ domain) }}"
      GOTRUE_SMTP_SENDER_NAME: "{{ supabase_smtp_sender_name | default('Muffin') }}"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M

  supabase-rest:
    image: postgrest/postgrest:v14.12
    environment:
      PGRST_DB_URI: postgres://authenticator:{{ supabase_db_password }}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,graphql_public
      PGRST_DB_MAX_ROWS: "1000"
      PGRST_DB_EXTRA_SEARCH_PATH: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: "{{ supabase_jwt_secret }}"
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: "{{ supabase_jwt_secret }}"
      PGRST_APP_SETTINGS_JWT_EXP: "3600"
    command: ["postgrest"]
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M

  # Live DB-change subscriptions (websockets). The dotted network alias is
  # load-bearing: Realtime derives its tenant id ("realtime-dev") from the
  # hostname Kong proxies to, matching the SEED_SELF_HOST-seeded tenant.
  supabase-realtime:
    image: supabase/realtime:v2.102.3
    environment:
      PORT: "4000"
      DB_HOST: supabase-db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: "{{ supabase_db_password }}"
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: "{{ supabase_realtime_db_enc_key }}"   # exactly 16 chars (official requirement)
      API_JWT_SECRET: "{{ supabase_jwt_secret }}"
      SECRET_KEY_BASE: "{{ supabase_secret_key_base }}"
      METRICS_JWT_SECRET: "{{ supabase_jwt_secret }}"
      ERL_AFLAGS: -proto_dist inet_tcp
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: realtime
      SEED_SELF_HOST: "true"
      RUN_JANITOR: "true"
      DISABLE_HEALTHCHECK_LOGGING: "true"
    networks:
      muffin-net:
        aliases:
          - realtime-dev.supabase-realtime
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M

  # S3-like file storage with RLS policies (avatars, exports); files live on the
  # node in the supabase-storage-data volume. imgproxy adds image transforms.
  supabase-storage:
    image: supabase/storage-api:v1.60.4
    environment:
      ANON_KEY: "{{ supabase_anon_key }}"
      SERVICE_KEY: "{{ supabase_service_role_key }}"
      POSTGREST_URL: http://supabase-rest:3000
      AUTH_JWT_SECRET: "{{ supabase_jwt_secret }}"
      DATABASE_URL: postgres://supabase_storage_admin:{{ supabase_db_password }}@supabase-db:5432/postgres
      STORAGE_PUBLIC_URL: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}"
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      GLOBAL_S3_BUCKET: stub
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M

  supabase-imgproxy:
    image: darthsim/imgproxy:v3.30.1
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: "16.8"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M

  # Deno serverless functions at /functions/v1/<name>; function sources are
  # staged by Ansible to /home/ubuntu/supabase/functions (main/ is the router).
  supabase-functions:
    image: supabase/edge-runtime:v1.74.0
    environment:
      JWT_SECRET: "{{ supabase_jwt_secret }}"
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}"
      SUPABASE_ANON_KEY: "{{ supabase_anon_key }}"
      SUPABASE_SERVICE_ROLE_KEY: "{{ supabase_service_role_key }}"
      SUPABASE_DB_URL: postgresql://postgres:{{ supabase_db_password }}@supabase-db:5432/postgres
      VERIFY_JWT: "true"
    volumes:
      - /home/ubuntu/supabase/functions:/home/deno/functions
    command: ["start", "--main-service", "/home/deno/functions/main"]
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M

  # Public gateway (EXPOSED via Traefik: supabase.<domain>) — key-auth (anon /
  # service_role) + CORS in front of GoTrue and PostgREST. Config rendered by
  # Ansible from stack/supabase/kong.yml (no runtime env substitution needed).
  supabase-kong:
    image: kong/kong:3.9.1
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_DNS_NOT_FOUND_TTL: "1"
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,request-termination,post-function
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
    volumes:
      - /home/ubuntu/supabase/kong.yml:/home/kong/kong.yml:ro
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=muffin-net"
        - "traefik.http.routers.supabase.rule=Host(`{{ supabase_subdomain | default('supabase') }}.{{ domain }}`)"
        - "traefik.http.routers.supabase.entrypoints=websecure"
        - "traefik.http.routers.supabase.tls.certresolver=cloudflare"
        - "traefik.http.services.supabase.loadbalancer.server.port=8000"

  supabase-meta:
    image: supabase/postgres-meta:v0.96.6
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: supabase-db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: "{{ supabase_db_password }}"
      CRYPTO_KEY: "{{ supabase_pg_meta_crypto_key }}"
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 256M

  # Admin dashboard (EXPOSED via Traefik: supabase-studio.<domain>, behind
  # Cloudflare Access — see terraform/cloudflare.tf).
  supabase-studio:
    image: supabase/studio:2026.06.03-sha-0bca601
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://supabase-meta:8080
      POSTGRES_HOST: supabase-db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: "{{ supabase_db_password }}"
      POSTGRES_USER_READ_WRITE: postgres
      PG_META_CRYPTO_KEY: "{{ supabase_pg_meta_crypto_key }}"
      PGRST_DB_SCHEMAS: public,graphql_public
      DEFAULT_ORGANIZATION_NAME: Muffin
      DEFAULT_PROJECT_NAME: Muffin
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_PUBLIC_URL: "https://{{ supabase_subdomain | default('supabase') }}.{{ domain }}"
      SUPABASE_ANON_KEY: "{{ supabase_anon_key }}"
      SUPABASE_SERVICE_KEY: "{{ supabase_service_role_key }}"
      AUTH_JWT_SECRET: "{{ supabase_jwt_secret }}"
      ENABLED_FEATURES_LOGS_ALL: "false"
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.swarm.network=muffin-net"
        - "traefik.http.routers.studio.rule=Host(`{{ studio_subdomain | default('supabase-studio') }}.{{ domain }}`)"
        - "traefik.http.routers.studio.entrypoints=websecure"
        - "traefik.http.routers.studio.tls.certresolver=cloudflare"
        - "traefik.http.services.studio.loadbalancer.server.port=3000"

  # --- Market data: OpenBB MCP (internal) ---------------------------------
  openbb-mcp:
    image: {{ image_openbb }}
    environment:
      # OpenBB provider API keys (from secrets.yaml). Add more providers as needed,
      # e.g. POLYGON_API_KEY / FRED_API_KEY / ALPHA_VANTAGE_API_KEY — see extras/openbb/.env.example.
      FMP_API_KEY: "{{ fmp_api_key | default('') }}"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8001),2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 1536M

  # --- Self-hosted meta-search (internal) ---------------------------------
  searxng:
    image: searxng/searxng:latest
    volumes:
      - /home/ubuntu/searxng:/etc/searxng:rw   # staged by Ansible
    environment:
      SEARXNG_SECRET_KEY: "{{ searxng_secret_key }}"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  # --- Python sandbox (internal; spawns sibling containers on host Docker) -
  opensandbox-server:
    image: opensandbox/server:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/ubuntu/config.toml:/etc/opensandbox/config.toml:ro
    # config.toml sets [docker].host_ip = docker_gwbridge gateway so the server reaches sandbox
    # published ports; host.docker.internal/host-gateway is NOT resolved under `docker stack deploy`.
    environment:
      SANDBOX_API_KEY: "{{ opensandbox_api_key | default('') }}"
      SANDBOX_CONFIG_PATH: /etc/opensandbox/config.toml
      # Newer opensandbox refuses to start without an API key unless this ack is set.
      # Safe here: the server is internal-only (no published port; reached only by langgraph-api
      # over the overlay). Set SANDBOX_API_KEY (opensandbox_api_key) to remove the insecure flag.
      OPENSANDBOX_INSECURE_SERVER: "{{ 'YES' if not opensandbox_api_key | default('') else 'NO' }}"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  # --- Firecrawl cluster (all internal) -----------------------------------
  firecrawl-redis:
    image: redis:alpine
    networks:
      - muffin-net
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 2s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 256M

  firecrawl-rabbitmq:
    image: rabbitmq:3
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  firecrawl-playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    environment:
      PORT: "3000"
      BLOCK_MEDIA: "true"
    networks:
      - muffin-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 2G

  firecrawl-postgres:
    # arm64 rebuild of firecrawl's nuq-postgres (upstream ghcr.io/firecrawl/nuq-postgres is
    # amd64-only). Built by muffin-agent CI (.github/workflows/build-nuq-postgres.yml).
    image: {{ image_nuq_postgres }}
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/firecrawl_postgres_password
    secrets:
      - firecrawl_postgres_password
    volumes:
      - firecrawl-postgres-data:/var/lib/postgresql/data
    networks:
      - muffin-net
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 512M

  firecrawl-api:
    image: ghcr.io/firecrawl/firecrawl
    command: node dist/src/harness.js --start-docker
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"
      ENV: production
      REDIS_URL: redis://firecrawl-redis:6379
      REDIS_RATE_LIMIT_URL: redis://firecrawl-redis:6379
      PLAYWRIGHT_MICROSERVICE_URL: http://firecrawl-playwright:3000/scrape
      USE_DB_AUTHENTICATION: "false"
      SEARXNG_ENDPOINT: http://searxng:8080
      NUQ_RABBITMQ_URL: amqp://firecrawl-rabbitmq:5672
      NUM_WORKERS_PER_QUEUE: "2"   # lowered from 8 to fit the 24 GB budget
      NUQ_DATABASE_URL: postgresql://postgres:{{ firecrawl_postgres_password }}@firecrawl-postgres:5432/postgres
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          # firecrawl spawns ~10 node workers (api + worker + 5 nuq-workers + prefetch +
          # reconciler + extract); 2G OOM-killed a worker (exit 137). VM has ample headroom.
          memory: 4G

  firecrawl-mcp:
    image: node:22-slim
    command: sh -c "npx --yes firecrawl-mcp"
    environment:
      HTTP_STREAMABLE_SERVER: "true"
      HOST: 0.0.0.0
      PORT: "3000"
      FIRECRAWL_API_URL: http://firecrawl-api:3002
      FIRECRAWL_API_KEY: "{{ firecrawl_api_key | default('local') }}"
    networks:
      - muffin-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').request({host:'localhost',port:3000,path:'/mcp',method:'POST'},r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1)).end()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M
