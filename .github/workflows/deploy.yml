name: Deploy to Oracle Cloud

# One `terraform apply` provisions/updates the OCI VM + Cloudflare AND deploys the Swarm stack
# (Terraform runs Ansible via cloud.terraform — see terraform/ansible.tf). Generates config.yml /
# secrets.yaml / the secret tfvars from INDIVIDUAL GitHub secrets + variables (no blob secrets).
#
# Required GitHub SECRETS:
#   OCI_API_KEY, SSH_PRIVATE_KEY,
#   OCI_TENANCY_OCID, OCI_USER_OCID, OCI_FINGERPRINT, OCI_COMPARTMENT_OCID,
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ZONE_ID, CLOUDFLARE_ACCOUNT_ID,
#   OPENROUTER_API_KEY, OLLAMA_API_KEY (Ollama Cloud — primary provider in llm_chain),
#   LANGSMITH_API_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_PUBLIC_KEY, FMP_API_KEY,
#   POSTGRES_PASSWORD, FIRECRAWL_POSTGRES_PASSWORD, SEARXNG_SECRET_KEY, REGISTRY_PASSWORD,
#   SUPABASE_DB_PASSWORD, SUPABASE_JWT_SECRET, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
#   SUPABASE_PG_META_CRYPTO_KEY, SUPABASE_SECRET_KEY_BASE, SUPABASE_REALTIME_DB_ENC_KEY
#   (generate all seven: stack/supabase/generate-keys.sh); optional SMTP for auth e-mails:
#   SUPABASE_SMTP_HOST/PORT/USER/PASS/ADMIN_EMAIL (unset -> signups auto-confirm);
#   optional OAuth: SUPABASE_GITHUB_CLIENT_ID/SECRET, SUPABASE_GOOGLE_CLIENT_ID/SECRET,
#   TFSTATE_S3_ACCESS_KEY_ID, TFSTATE_S3_SECRET_ACCESS_KEY (OCI Object Storage S3 backend creds)
# Required GitHub VARIABLES:
#   OCI_REGION, DOMAIN, APP_SUBDOMAIN (default muffin), CHAT_SUBDOMAIN (default muffin-chat),
#   API_SUBDOMAIN, ACME_EMAIL, ACCESS_EMAILS (JSON list),
#   SUPABASE_SUBDOMAIN (default supabase), STUDIO_SUBDOMAIN (default supabase-studio),
#   USE_SUPABASE_DB (default false — flip to true only after the DB cutover, see README),
#   LANGSMITH_PROJECT, REGISTRY_USERNAME
#   (legacy/optional, superseded by the hardcoded llm_chain: LLM_PROVIDER, ORCHESTRATOR_MODELS,
#    COLLECTOR_MODELS, REASONER_MODELS, SUMMARISER_MODEL — safe to leave unset/delete)
#
# State is remote (terraform/backend.tf -> OCI Object Storage). Triggers: manual dispatch, and a
# repository_dispatch(type: deploy) sent by the image repos when a new image is published (auto-CD).
on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

# Serialise deploys: several image repos can fire `deploy` at once, and parallel `terraform apply`
# runs collide on the shared OCI Object Storage remote state (S3-compat locking is unreliable).
# Queue them instead of cancelling — every image change should land.
concurrency:
  group: deploy-oracle
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible + cloud.terraform
        run: |
          # pin to the known-good combo: cloud.terraform 4.0.0's inventory plugin calls
          # get_bin_path(required=...), removed in ansible-core 2.19 -> keep ansible-core < 2.19.
          # setup-python puts THIS ansible on PATH (the runner's pre-installed one is newer).
          python3 -m pip install 'ansible-core>=2.18,<2.19'
          ansible-galaxy collection install -r ansible/requirements.yml
          echo "using $(command -v ansible-playbook)"; ansible --version | head -1
      - name: Materialise keys
        run: |
          mkdir -p ~/.ssh
          # trailing newline is required or ssh-keygen/openssl reject the key ("error in libcrypto")
          printf '%s\n' "${{ secrets.OCI_API_KEY }}"     > terraform/oci_api_key.pem && chmod 600 terraform/oci_api_key.pem
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/oci_key && chmod 600 ~/.ssh/oci_key
          ssh-keygen -y -f ~/.ssh/oci_key > ~/.ssh/oci_key.pub
      - name: Generate stack/config.yml (non-secret)
        run: |
          cat > stack/config.yml <<EOF
          domain: "${{ vars.DOMAIN }}"
          app_subdomain: "${{ vars.APP_SUBDOMAIN || 'muffin' }}"
          chat_subdomain: "${{ vars.CHAT_SUBDOMAIN || 'muffin-chat' }}"
          api_subdomain: "${{ vars.API_SUBDOMAIN }}"
          supabase_subdomain: "${{ vars.SUPABASE_SUBDOMAIN || 'supabase' }}"
          studio_subdomain: "${{ vars.STUDIO_SUBDOMAIN || 'supabase-studio' }}"
          use_supabase_db: ${{ vars.USE_SUPABASE_DB || 'false' }}
          acme_email: "${{ vars.ACME_EMAIL }}"
          image_agent: "ghcr.io/${{ github.repository_owner }}/muffin-agent:latest"
          image_openbb: "ghcr.io/${{ github.repository_owner }}/openbb-mcp-docker:latest"
          image_ui: "ghcr.io/${{ github.repository_owner }}/agent-chat-ui-docker:latest"
          image_app: "ghcr.io/${{ github.repository_owner }}/muffin-ui:latest"
          image_nuq_postgres: "ghcr.io/${{ github.repository_owner }}/nuq-postgres-docker:latest"
          registry_server: "ghcr.io"
          registry_username: "${{ vars.REGISTRY_USERNAME }}"
          llm_provider: "${{ vars.LLM_PROVIDER }}"
          openai_site_url: "https://openrouter.ai/api/v1"
          # Cross-provider model chain (primary first, rest fallbacks). Authoritative
          # for every role — supersedes llm_provider/model + the per-role *_models
          # chains. Keys resolve from the *_api_key secrets (profiles omit api_key).
          llm_chain:
            - provider: ollama
              model: "minimax-m3:cloud"
            - provider: openrouter
              model: "nvidia/nemotron-3-super-120b-a12b:free"
              requests_per_second: 0.3
          # Per-role chains left for reference but IGNORED while llm_chain is set.
          orchestrator_models: "${{ vars.ORCHESTRATOR_MODELS }}"
          collector_models: "${{ vars.COLLECTOR_MODELS }}"
          reasoner_models: "${{ vars.REASONER_MODELS }}"
          # Summariser uses the single-model path → the derived primary provider
          # (Ollama), so its model must be an Ollama tag, not an OpenRouter one.
          summariser_model: "minimax-m3:cloud"
          llm_sdk_retries: 6
          temperature: 0.1
          llm_requests_per_second: "${{ vars.LLM_REQUESTS_PER_SECOND }}"
          langsmith_tracing: "true"
          langsmith_endpoint: "https://api.smith.langchain.com"
          langsmith_project: "${{ vars.LANGSMITH_PROJECT }}"
          langfuse_base_url: "https://cloud.langfuse.com"
          firecrawl_api_key: "local"
          memory_debug_user_id: "shared"
          # Nightly DB backups -> OCI Object Storage (S3-compatible). Bucket is created
          # by terraform (backups.tf); the script prunes >30d. Upload reuses the tfstate
          # S3 Customer Secret Keys already in this job's env (AWS_ACCESS_KEY_ID/SECRET).
          # Endpoint mirrors terraform/backend.tf.
          db_backups_enabled: true
          db_backups_bucket: "muffin-db-backups"
          db_backups_s3_endpoint: "https://lrjqtgyopxbk.compat.objectstorage.uk-london-1.oraclecloud.com"
          EOF
      - name: Generate stack/secrets.yaml (secrets)
        run: |
          cat > stack/secrets.yaml <<EOF
          openrouter_api_key: "${{ secrets.OPENROUTER_API_KEY }}"
          ollama_api_key: "${{ secrets.OLLAMA_API_KEY }}"
          langsmith_api_key: "${{ secrets.LANGSMITH_API_KEY }}"
          langfuse_secret_key: "${{ secrets.LANGFUSE_SECRET_KEY }}"
          langfuse_public_key: "${{ secrets.LANGFUSE_PUBLIC_KEY }}"
          fmp_api_key: "${{ secrets.FMP_API_KEY }}"
          postgres_password: "${{ secrets.POSTGRES_PASSWORD }}"
          firecrawl_postgres_password: "${{ secrets.FIRECRAWL_POSTGRES_PASSWORD }}"
          searxng_secret_key: "${{ secrets.SEARXNG_SECRET_KEY }}"
          cf_dns_api_token: "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          registry_password: "${{ secrets.REGISTRY_PASSWORD }}"
          supabase_db_password: "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase_jwt_secret: "${{ secrets.SUPABASE_JWT_SECRET }}"
          supabase_anon_key: "${{ secrets.SUPABASE_ANON_KEY }}"
          supabase_service_role_key: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          supabase_pg_meta_crypto_key: "${{ secrets.SUPABASE_PG_META_CRYPTO_KEY }}"
          supabase_secret_key_base: "${{ secrets.SUPABASE_SECRET_KEY_BASE }}"
          supabase_realtime_db_enc_key: "${{ secrets.SUPABASE_REALTIME_DB_ENC_KEY }}"
          supabase_smtp_host: "${{ secrets.SUPABASE_SMTP_HOST }}"
          supabase_smtp_port: "${{ secrets.SUPABASE_SMTP_PORT || '465' }}"
          supabase_smtp_user: "${{ secrets.SUPABASE_SMTP_USER }}"
          supabase_smtp_pass: "${{ secrets.SUPABASE_SMTP_PASS }}"
          supabase_smtp_admin_email: "${{ secrets.SUPABASE_SMTP_ADMIN_EMAIL }}"
          supabase_github_client_id: "${{ secrets.SUPABASE_GITHUB_CLIENT_ID }}"
          supabase_github_secret: "${{ secrets.SUPABASE_GITHUB_SECRET }}"
          supabase_google_client_id: "${{ secrets.SUPABASE_GOOGLE_CLIENT_ID }}"
          supabase_google_secret: "${{ secrets.SUPABASE_GOOGLE_SECRET }}"
          EOF
      - name: Terraform apply (provisions + runs Ansible)
        working-directory: terraform
        run: |
          terraform init -input=false
          # ansible_playbook.muffin has replayable=true, so apply re-runs the idempotent playbook
          # every time (docker stack deploy --resolve-image always re-resolves :latest) — no -replace.
          terraform apply -auto-approve -input=false
        env:
          # OCI Object Storage S3 backend auth (+ disable AWS chunked-encoding, unsupported by OCI)
          AWS_ACCESS_KEY_ID:                 ${{ secrets.TFSTATE_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:             ${{ secrets.TFSTATE_S3_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION:  when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION:  when_required
          # ansible.cfg sets stdout_callback=yaml (nice locally); force the built-in in CI so we
          # don't depend on the community.general yaml callback being present. Inherited by local-exec.
          ANSIBLE_STDOUT_CALLBACK:           default
          TF_VAR_tenancy_ocid:               ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:                  ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:                ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_compartment_ocid:           ${{ secrets.OCI_COMPARTMENT_OCID }}
          TF_VAR_region:                     ${{ vars.OCI_REGION }}
          TF_VAR_private_key_path:           ${{ github.workspace }}/terraform/oci_api_key.pem
          TF_VAR_ssh_public_key_path:        /home/runner/.ssh/oci_key.pub
          TF_VAR_ssh_private_key_path:       /home/runner/.ssh/oci_key
          TF_VAR_cloudflare_api_token:       ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id:         ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_account_id:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_domain:          ${{ vars.DOMAIN }}
          TF_VAR_cloudflare_app_subdomain:   ${{ vars.APP_SUBDOMAIN || 'muffin' }}
          TF_VAR_cloudflare_chat_subdomain:  ${{ vars.CHAT_SUBDOMAIN || 'muffin-chat' }}
          TF_VAR_cloudflare_api_subdomain:   ${{ vars.API_SUBDOMAIN }}
          TF_VAR_cloudflare_supabase_subdomain: ${{ vars.SUPABASE_SUBDOMAIN || 'supabase' }}
          TF_VAR_cloudflare_studio_subdomain:   ${{ vars.STUDIO_SUBDOMAIN || 'supabase-studio' }}
          TF_VAR_cloudflare_access_emails:   ${{ vars.ACCESS_EMAILS }}
