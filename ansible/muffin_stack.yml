---
# Deploy the Muffin Agent stack to a single-node OCI Always-Free Swarm.
#
# Prereqs on the control machine (your Mac), in docker-stack/templates/muffin/:
#   - config.yml           (copy from config.example.yml — non-secret deploy config)
#   - secrets.yaml         (copy from secrets.example.yaml — API keys / passwords / tokens)
#   - config.toml          (cp ../../../../muffin-agent/extras/opensandbox/config.toml)
#   - searxng/             (cp -r ../../../../muffin-agent/extras/searxng)
# Plus: images built & pushed (GitHub Actions `build-images.yml`, or build-and-push.sh locally).
#
# Run from ansible/:
#   ./generate_inventory.sh default
#   export ANSIBLE_HOST_KEY_CHECKING=false
#   ansible-playbook -i default.inventory.ini muffin_stack.yml -u ubuntu --private-key ~/.ssh/oci_key

# --- 1. Harden every node + open Swarm/ingress ports ----------------------
- hosts: all
  become: true
  gather_facts: true
  # Free disk before anything touches apt: old :latest image layers and logs
  # can fill the Always-Free boot volume and brick the whole run
  # ("No space left on device" from apt).
  pre_tasks:
    - name: Clear the apt package cache
      command: apt-get clean
      changed_when: true

    - name: Vacuum systemd journal down to 200M
      command: journalctl --vacuum-size=200M
      changed_when: true
      failed_when: false

    - name: Check whether Docker is installed yet
      command: which docker
      register: docker_bin
      changed_when: false
      failed_when: false

    - name: Prune unused Docker data (images, stopped containers, build cache — never volumes)
      command: docker system prune -af
      when: docker_bin.rc == 0
      changed_when: true
  roles:
    - oci-swarm-node
  vars:
    ufw_tcp_ports:
      - 22    # SSH
      - 80    # Traefik HTTP (redirects to 443)
      - 443   # Traefik HTTPS
      - 7946  # Docker Swarm
      - 4789  # Docker Swarm
      - 2377  # Docker Swarm
    ufw_udp_ports:
      - 22    # SSH
      - 7946  # Docker Swarm
      - 4789  # Docker Swarm
      - 2377  # Docker Swarm
    ssh_permit_root_login: "no"

# --- 2. Form the Swarm ----------------------------------------------------
- hosts: manager
  become: true
  roles:
    - swarm_manager

- hosts: workers
  become: true
  roles:
    - swarm_worker

# --- 3. Stage config + env files onto the manager -------------------------
- name: Stage Muffin runtime files
  hosts: manager
  become: true
  vars:
    muffin_template_dir: ../stack
  tasks:
    - name: Load non-secret config
      include_vars:
        file: "{{ muffin_template_dir }}/config.yml"

    - name: Load secrets
      include_vars:
        file: "{{ muffin_template_dir }}/secrets.yaml"

    - name: Stage opensandbox config.toml
      copy:
        src: "../config/opensandbox/config.toml"
        dest: /home/ubuntu/config.toml

    - name: Stage SearxNG settings directory
      copy:
        src: "../config/searxng/"
        dest: /home/ubuntu/searxng/

    - name: Render Traefik static config
      template:
        src: "{{ muffin_template_dir }}/traefik.yml"
        dest: /home/ubuntu/traefik.yml

    - name: Stage Supabase db init scripts (verbatim upstream; run on first db boot only)
      copy:
        src: "{{ muffin_template_dir }}/supabase/db/"
        dest: /home/ubuntu/supabase/db/

    - name: Render Supabase Kong declarative config
      template:
        src: "{{ muffin_template_dir }}/supabase/kong.yml"
        # World-readable like the rendered compose file (Kong runs as a non-root
        # user in-container and must be able to read it).
        dest: /home/ubuntu/supabase/kong.yml
        mode: "0644"

    - name: Stage Supabase app migrations (idempotent; applied post-deploy below)
      copy:
        src: "{{ muffin_template_dir }}/supabase/migrations/"
        dest: /home/ubuntu/supabase/migrations/

    - name: Stage Supabase edge-function sources (main/ is the upstream router)
      copy:
        src: "{{ muffin_template_dir }}/supabase/functions/"
        dest: /home/ubuntu/supabase/functions/

    - name: Render the Swarm stack file
      template:
        src: "{{ muffin_template_dir }}/docker-compose.yaml"
        dest: /home/ubuntu/docker-compose.yaml

# --- 4. Registry login + Docker secrets -----------------------------------
- name: Prepare registry auth and Docker secrets
  hosts: manager
  become: true
  vars:
    muffin_template_dir: ../stack
  tasks:
    - name: Load non-secret config
      include_vars:
        file: "{{ muffin_template_dir }}/config.yml"

    - name: Load secrets
      include_vars:
        file: "{{ muffin_template_dir }}/secrets.yaml"

    # All ghcr.io/gururafiki/* images are PUBLIC, so pulls work anonymously and a
    # registry login is not required. We still attempt it when a password is set
    # (in case an image is ever made private), but a failure must NOT block the
    # deploy — e.g. an expired/rotated REGISTRY_PASSWORD. `docker stack deploy
    # --with-registry-auth` then just forwards no ghcr credential and pulls
    # anonymously.
    - name: Log in to the container registry (optional; images are public)
      shell: "echo {{ registry_password | quote }} | docker login {{ registry_server }} -u {{ registry_username | quote }} --password-stdin"
      no_log: true
      changed_when: true
      failed_when: false
      when: registry_password | default('') | length > 0

    - name: Create Docker secrets (idempotent)
      shell: "echo -n {{ item.value | quote }} | docker secret create {{ item.name }} -"
      no_log: true
      register: secret_create
      changed_when: "'already exists' not in (secret_create.stderr | default(''))"
      failed_when:
        - secret_create.rc != 0
        - "'already exists' not in (secret_create.stderr | default(''))"
      loop:
        - { name: "postgres_password", value: "{{ postgres_password }}" }
        - { name: "firecrawl_postgres_password", value: "{{ firecrawl_postgres_password }}" }
        - { name: "cf_dns_api_token", value: "{{ cf_dns_api_token }}" }
      loop_control:
        label: "{{ item.name }}"

# --- 5. Deploy the stack --------------------------------------------------
- name: Deploy the Muffin stack
  hosts: manager
  become: true
  tasks:
    - name: docker stack deploy (with registry auth so the node can pull private images)
      command: "docker stack deploy -c /home/ubuntu/docker-compose.yaml --with-registry-auth muffin"

# --- 6. Supabase post-deploy migrations ------------------------------------
# App tables reference auth.users, which GoTrue creates on ITS first boot — so these
# run after the stack is up, waiting for GoTrue's migrations, and are idempotent
# (safe to re-run on every deploy).
- name: Apply Supabase app migrations
  hosts: manager
  become: true
  tasks:
    - name: Wait for supabase-db to be ready
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        pg_isready -U postgres -h localhost
      register: db_ready
      until: db_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for GoTrue to have created the auth schema
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -tAc "SELECT 1 FROM information_schema.tables
        WHERE table_schema='auth' AND table_name='users'"
      register: auth_ready
      until: auth_ready.stdout is search('1')
      retries: 30
      delay: 10
      changed_when: false

    # LangGraph uses the Supabase `postgres` database directly (use_supabase_db)
    # and keeps its tables in `public` — where langgraph-api naturally creates and
    # finds them: it connects as `postgres` on the DEFAULT search_path, does NOT
    # honour a client-side PGOPTIONS, and recreates its tables in public whenever
    # they're missing. Because it's the same `postgres` database Studio is pinned
    # to, LangGraph's tables are browsable in Studio. A dedicated `langgraph`
    # schema was attempted and abandoned (langgraph-api kept recreating tables in
    # public → 500s + duplicate tables); a robust namespaced setup would need the
    # role search_path baked into a supabase-db init script that runs BEFORE
    # langgraph-api's first connection (see README). This drop cleans up any stale
    # schema left by that attempt; idempotent (langgraph-api never recreates it).
    - name: Drop the abandoned langgraph schema (LangGraph uses public in the postgres DB)
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -d postgres -v ON_ERROR_STOP=1
        -c "DROP SCHEMA IF EXISTS langgraph CASCADE"
      changed_when: false
      when: use_supabase_db | default(false)

    - name: Apply idempotent app migrations (tables + RLS)
      shell: >
        docker exec -i "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -v ON_ERROR_STOP=1 -d postgres
        < "/home/ubuntu/supabase/migrations/{{ item | basename }}"
      with_fileglob:
        - "{{ playbook_dir }}/../stack/supabase/migrations/*.sql"
      loop_control:
        label: "{{ item | basename }}"
      changed_when: true

# --- 6. Nightly database backups (pg_dumpall -> OCI Object Storage) --------
- name: Configure database backups
  hosts: manager
  become: true
  vars:
    muffin_template_dir: ../stack
  tasks:
    - name: Load non-secret config
      include_vars:
        file: "{{ muffin_template_dir }}/config.yml"

    # The S3 Customer Secret Keys are the same ones the tfstate backend uses —
    # already in the deploy env as AWS_ACCESS_KEY_ID/SECRET (see deploy.yml). Read
    # them here and stage a root-only env file so the cron uploads with no new
    # secret. If they're absent (e.g. a local run without S3 creds), skip backups.
    - name: Detect S3 credentials in the deploy environment
      set_fact:
        _s3_key: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
        _s3_secret: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
      no_log: true

    - name: Note when backups are skipped (no S3 credentials)
      debug:
        msg: "DB backups skipped: AWS_ACCESS_KEY_ID not in the deploy environment."
      when: (db_backups_enabled | default(true)) and (_s3_key | length == 0)

    - name: Configure nightly supabase-db backups
      when: (db_backups_enabled | default(true)) and (_s3_key | length > 0)
      block:
        - name: Ensure /etc/muffin exists
          file:
            path: /etc/muffin
            state: directory
            mode: "0700"

        - name: Stage the S3 credentials (root-only)
          copy:
            dest: /etc/muffin/backup.env
            mode: "0600"
            content: |
              AWS_ACCESS_KEY_ID={{ _s3_key }}
              AWS_SECRET_ACCESS_KEY={{ _s3_secret }}
              AWS_REQUEST_CHECKSUM_CALCULATION=when_required
              AWS_RESPONSE_CHECKSUM_VALIDATION=when_required
          no_log: true

        - name: Stage the backup script
          template:
            src: "{{ muffin_template_dir }}/muffin-db-backup.sh"
            dest: /usr/local/bin/muffin-db-backup.sh
            mode: "0755"

        - name: Install the nightly backup cron (03:00 UTC)
          cron:
            name: muffin-db-backup
            minute: "0"
            hour: "3"
            user: root
            job: "/usr/local/bin/muffin-db-backup.sh >> /var/log/muffin-db-backup.log 2>&1"

        # Fire-and-forget (poll: 0) so it NEVER holds or severs the deploy's SSH
        # session — a synchronous run once starved the node and knocked services
        # to 0/1. It also runs niced + checkpoint-light now; verify the object
        # landed with `oci os object list --bucket-name muffin-db-backups`.
        - name: Seed one backup now (async)
          command: /usr/local/bin/muffin-db-backup.sh
          async: 900
          poll: 0
          changed_when: true
