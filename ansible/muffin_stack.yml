---
# Deploy the Muffin Agent stack to a single-node OCI Always-Free Swarm.
#
# Prereqs on the control machine (your Mac), in docker-stack/templates/muffin/:
#   - config.yml           (copy from config.example.yml — non-secret deploy config)
#   - secrets.yaml         (copy from secrets.example.yaml — API keys / passwords / tokens)
#   - config.toml          (cp ../../../../muffin-agent/extras/opensandbox/config.toml)
#   - searxng/             (cp -r ../../../../muffin-agent/extras/searxng)
# Plus: images built & pushed (GitHub Actions `build-images.yml`, or build-and-push.sh locally).
#
# Run from ansible/:
#   ./generate_inventory.sh default
#   export ANSIBLE_HOST_KEY_CHECKING=false
#   ansible-playbook -i default.inventory.ini muffin_stack.yml -u ubuntu --private-key ~/.ssh/oci_key

# --- 1. Harden every node + open Swarm/ingress ports ----------------------
- hosts: all
  become: true
  gather_facts: true
  # Free disk before anything touches apt: old :latest image layers and logs
  # can fill the Always-Free boot volume and brick the whole run
  # ("No space left on device" from apt).
  pre_tasks:
    - name: Clear the apt package cache
      command: apt-get clean
      changed_when: true

    - name: Vacuum systemd journal down to 200M
      command: journalctl --vacuum-size=200M
      changed_when: true
      failed_when: false

    - name: Check whether Docker is installed yet
      command: which docker
      register: docker_bin
      changed_when: false
      failed_when: false

    - name: Prune unused Docker data (images, stopped containers, build cache — never volumes)
      command: docker system prune -af
      when: docker_bin.rc == 0
      changed_when: true
  roles:
    - oci-swarm-node
  vars:
    ufw_tcp_ports:
      - 22    # SSH
      - 80    # Traefik HTTP (redirects to 443)
      - 443   # Traefik HTTPS
      - 7946  # Docker Swarm
      - 4789  # Docker Swarm
      - 2377  # Docker Swarm
    ufw_udp_ports:
      - 22    # SSH
      - 7946  # Docker Swarm
      - 4789  # Docker Swarm
      - 2377  # Docker Swarm
    ssh_permit_root_login: "no"

# --- 2. Form the Swarm ----------------------------------------------------
- hosts: manager
  become: true
  roles:
    - swarm_manager

- hosts: workers
  become: true
  roles:
    - swarm_worker

# --- 3. Stage config + env files onto the manager -------------------------
- name: Stage Muffin runtime files
  hosts: manager
  become: true
  vars:
    muffin_template_dir: ../stack
  tasks:
    - name: Load non-secret config
      include_vars:
        file: "{{ muffin_template_dir }}/config.yml"

    - name: Load secrets
      include_vars:
        file: "{{ muffin_template_dir }}/secrets.yaml"

    - name: Stage opensandbox config.toml
      copy:
        src: "../config/opensandbox/config.toml"
        dest: /home/ubuntu/config.toml

    - name: Stage SearxNG settings directory
      copy:
        src: "../config/searxng/"
        dest: /home/ubuntu/searxng/

    - name: Render Traefik static config
      template:
        src: "{{ muffin_template_dir }}/traefik.yml"
        dest: /home/ubuntu/traefik.yml

    - name: Stage Supabase db init scripts (verbatim upstream; run on first db boot only)
      copy:
        src: "{{ muffin_template_dir }}/supabase/db/"
        dest: /home/ubuntu/supabase/db/

    - name: Render Supabase Kong declarative config
      template:
        src: "{{ muffin_template_dir }}/supabase/kong.yml"
        # World-readable like the rendered compose file (Kong runs as a non-root
        # user in-container and must be able to read it).
        dest: /home/ubuntu/supabase/kong.yml
        mode: "0644"

    - name: Stage Supabase app migrations (idempotent; applied post-deploy below)
      copy:
        src: "{{ muffin_template_dir }}/supabase/migrations/"
        dest: /home/ubuntu/supabase/migrations/

    - name: Stage Supabase edge-function sources (main/ is the upstream router)
      copy:
        src: "{{ muffin_template_dir }}/supabase/functions/"
        dest: /home/ubuntu/supabase/functions/

    - name: Render the Swarm stack file
      template:
        src: "{{ muffin_template_dir }}/docker-compose.yaml"
        dest: /home/ubuntu/docker-compose.yaml

# --- 4. Registry login + Docker secrets -----------------------------------
- name: Prepare registry auth and Docker secrets
  hosts: manager
  become: true
  vars:
    muffin_template_dir: ../stack
  tasks:
    - name: Load non-secret config
      include_vars:
        file: "{{ muffin_template_dir }}/config.yml"

    - name: Load secrets
      include_vars:
        file: "{{ muffin_template_dir }}/secrets.yaml"

    - name: Log in to the container registry (only if a password is set; public GHCR pulls anonymously)
      shell: "echo {{ registry_password | quote }} | docker login {{ registry_server }} -u {{ registry_username | quote }} --password-stdin"
      no_log: true
      changed_when: true
      when: registry_password | default('') | length > 0

    - name: Create Docker secrets (idempotent)
      shell: "echo -n {{ item.value | quote }} | docker secret create {{ item.name }} -"
      no_log: true
      register: secret_create
      changed_when: "'already exists' not in (secret_create.stderr | default(''))"
      failed_when:
        - secret_create.rc != 0
        - "'already exists' not in (secret_create.stderr | default(''))"
      loop:
        - { name: "postgres_password", value: "{{ postgres_password }}" }
        - { name: "firecrawl_postgres_password", value: "{{ firecrawl_postgres_password }}" }
        - { name: "cf_dns_api_token", value: "{{ cf_dns_api_token }}" }
      loop_control:
        label: "{{ item.name }}"

# --- 5. Deploy the stack --------------------------------------------------
- name: Deploy the Muffin stack
  hosts: manager
  become: true
  tasks:
    - name: docker stack deploy (with registry auth so the node can pull private images)
      command: "docker stack deploy -c /home/ubuntu/docker-compose.yaml --with-registry-auth muffin"

# --- 6. Supabase post-deploy migrations ------------------------------------
# App tables reference auth.users, which GoTrue creates on ITS first boot — so these
# run after the stack is up, waiting for GoTrue's migrations, and are idempotent
# (safe to re-run on every deploy).
- name: Apply Supabase app migrations
  hosts: manager
  become: true
  tasks:
    - name: Wait for supabase-db to be ready
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        pg_isready -U postgres -h localhost
      register: db_ready
      until: db_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for GoTrue to have created the auth schema
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -tAc "SELECT 1 FROM information_schema.tables
        WHERE table_schema='auth' AND table_name='users'"
      register: auth_ready
      until: auth_ready.stdout is search('1')
      retries: 30
      delay: 10
      changed_when: false

    # LangGraph lives in a dedicated `langgraph` SCHEMA of the Supabase `postgres`
    # database (not a separate database) so it's visible in Supabase Studio, which
    # is pinned to one database. langgraph-api connects to `postgres` with
    # search_path=langgraph,... (PGOPTIONS in the stack file) and migrates its
    # tables into this schema. The schema must pre-exist for its unqualified
    # CREATEs to land here. Extensions LangGraph needs resolve via the rest of the
    # search_path (public + Supabase's `extensions` schema).
    - name: Create the langgraph schema in the Supabase postgres DB
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -d postgres -v ON_ERROR_STOP=1
        -c "CREATE SCHEMA IF NOT EXISTS langgraph AUTHORIZATION postgres"
      register: langgraph_schema
      changed_when: false
      when: use_supabase_db | default(false)

    # `docker stack deploy` (above) starts langgraph-api before the schema exists,
    # so on a fresh volume LangGraph's unqualified CREATEs land in `public` (the
    # first existing schema on its search_path). Relocate them into `langgraph` —
    # idempotent (ALTER TABLE IF EXISTS no-ops once moved), and transparent to a
    # live langgraph-api because its search_path (PGOPTIONS) lists langgraph before
    # public. This is the stable table set for the pinned LangGraph image; extend
    # the list if a future version adds tables.
    - name: Relocate LangGraph tables from public into the langgraph schema
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -d postgres -v ON_ERROR_STOP=1
        -c "ALTER TABLE IF EXISTS public.{{ item }} SET SCHEMA langgraph"
      loop:
        - assistant
        - assistant_versions
        - checkpoint_blobs
        - checkpoint_delete_queue
        - checkpoint_writes
        - checkpoints
        - cron
        - run
        - schema_migrations
        - store
        - thread
        - thread_ttl
      changed_when: false
      when: use_supabase_db | default(false)

    # langgraph-api connects as `postgres` and relies on the session's DEFAULT
    # search_path (it sets none itself, and its psycopg pool does not honour the
    # container's PGOPTIONS), so the only reliable way to route its unqualified
    # tables into the langgraph schema is the server-side role default. Scoped to
    # the postgres role IN the postgres DB: Supabase's other services connect as
    # their own roles and the app migrations are `public.`-qualified, so they are
    # unaffected. Idempotent.
    - name: Set the langgraph search_path as the postgres role default (postgres DB)
      shell: >
        docker exec "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -d postgres -v ON_ERROR_STOP=1
        -c "ALTER ROLE postgres IN DATABASE postgres SET search_path = langgraph, public, extensions"
      changed_when: false
      when: use_supabase_db | default(false)

    # A role default only applies to NEW sessions, so bounce langgraph-api — its
    # pooled connections predate the ALTER ROLE above. After the restart it
    # reconnects and resolves its unqualified tables from the langgraph schema.
    - name: Restart langgraph-api so it reconnects with the langgraph search_path
      shell: docker service update --force --detach muffin_langgraph-api
      changed_when: false
      when: use_supabase_db | default(false)

    - name: Apply idempotent app migrations (tables + RLS)
      shell: >
        docker exec -i "$(docker ps -qf name=muffin_supabase-db | head -1)"
        psql -U postgres -v ON_ERROR_STOP=1 -d postgres
        < "/home/ubuntu/supabase/migrations/{{ item | basename }}"
      with_fileglob:
        - "{{ playbook_dir }}/../stack/supabase/migrations/*.sql"
      loop_control:
        label: "{{ item | basename }}"
      changed_when: true
